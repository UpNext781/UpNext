name: Staging CI

on:
  push:
    branches: ["staging"]
  pull_request:
    branches: ["staging"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: node --check server.js
      - run: node --check lineupService.js
      - run: node --check db.js
